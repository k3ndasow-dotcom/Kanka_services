<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanka Services 🚀 - Accueil</title>
    <style>
        /* Le CSS : C'est la décoration de ta page */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background-color: #f4f7f6; 
            text-align: center;
        }
        header { 
            background: #2c3e50; 
            color: white; 
            padding: 2rem; 
            margin-bottom: 30px;
        }
        .container { 
            max-width: 800px; 
            margin: auto; 
            background: white; 
            padding: 40px; 
            border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }
        h1 { color: #ffffff; margin: 0; }
        p { color: #7f8c8d; font-size: 1.2rem; }
        
        /* Style des boutons */
        .btn-group { margin-top: 40px; display: flex; justify-content: center; gap: 20px; }
        
        .btn { 
            padding: 15px 30px; 
            font-size: 18px; 
            font-weight: bold;
            border-radius: 8px; 
            text-decoration: none; 
            color: white;
            transition: transform 0.2s;
            display: inline-block;
        }
        .btn:hover { transform: scale(1.05); }
        
        .btn-commande { background-color: #27ae60; }
        .btn-assistance { background-color: #2980b9; }
        
        footer { margin-top: 50px; color: #bdc3c7; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <h1>KANKA SERVICES 🚀</h1>
        <p style="color: #bdc3c7; margin-top: 10px;">Votre partenaire numérique à Kankalabé</p>
    </header>

    <div class="container">
        <h2>Que souhaitez-vous faire aujourd'hui ?</h2>
        <p>Expertise en Consulting, Informatique et Maintenance.</p>

        <div class="btn-group">
            <a href="/passer-commande" class="btn btn-commande">
                📦 Passer une commande
            </a>

            <a href="/demander-aide" class="btn btn-assistance">
                🛠️ Demander assistance
            </a>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 K-Smart - Tous droits réservés</p>
    </footer>

</body>
</html>
